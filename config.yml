customCommands:
  - key: "C"
    context: "files"
    description: "AI commit"
    prompts:
      - type: "input"
        key: "CommitMsg"
        title: "Commit message"
        initialValue: "{{ runCommand \"bash -lc '$HOME/.config/nvim/scripts/git-commit-ai.py'\" }}"
    command: "git commit -a -m {{ .Form.CommitMsg | quote }}"
    output: none
  - key: "P"
    context: "localBranches"
    description: "AI PR create"
    prompts:
      - type: "input"
        key: "PrTitle"
        title: "PR title"
        initialValue: >-
          {{ runCommand "bash -lc '$HOME/.config/nvim/scripts/git-commit-ai.py --pr-title'" }}

      - type: "input"
        key: "PrBody"
        title: "PR body"
        initialValue: >-
          {{ runCommand "bash -lc '$HOME/.config/nvim/scripts/git-commit-ai.py --pr-body'" }}

    command: >-
      gh pr create --title {{ .Form.PrTitle | quote }} --body {{ .Form.PrBody | quote }}
    output: none
