customCommands:
  - key: "C"
    context: "files"
    description: "AI commit"
    prompts:
      - type: "input"
        key: "CommitMsg"
        title: "Commit message"
        initialValue: "{{ runCommand \"bash -lc '$HOME/.config/nvim/scripts/git-commit-ai.py'\" }}"
    command: "git commit -a -m {{ .Form.CommitMsg | quote }}"
    output: none
  - key: "P"
    context: "localBranches"
    description: "AI PR create"
    prompts:
      - type: "input"
        key: "PrTitle"
        title: "PR title"
        initialValue: >-
          {{ runCommand "bash -lc \"git diff origin/main...HEAD | opencode run 'Write a short GitHub PR title in conventional commit style (max 72 chars). Only output the title.' > /tmp/oc-title 2>&1 && tail -n +4 /tmp/oc-title\"" }}

      - type: "input"
        key: "PrBody"
        title: "PR body"
        initialValue: >-
          {{ runCommand "bash -lc \"git diff origin/main...HEAD | opencode run 'Write a concise GitHub PR body as bullet points. No intro text. No code fences.' > /tmp/oc-body 2>&1 && tail -n +4 /tmp/oc-body\"" }}

    command: >-
      echo gh pr create --title {{ .Form.PrTitle | quote }} --body {{ .Form.PrBody | quote }}
    output: terminal
